model:
  name: resnet50
  pretrained: true
  num_classes: 1

training:
  epochs: 30
  batch_size: 32
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  early_stopping_patience: 5
  loss: bce_with_logits
  device: auto              # "auto" | "cpu" | "mps" | "cuda"
  pos_weight: auto          # "auto" (n_neg/n_pos from train set) | float | null
  use_weighted_sampler: true  # oversample minority class each epoch

data:
  dpi: 150
  image_size: 224
  grayscale: true
  augmentation: true
  metadata_csv: "data/metadata_simple.csv"
  rendered_dir: "data/rendered_pages_simple"

splits:
  strategy: stratified_random          # simple two-folder pipeline (ADR-0001) — random per-page
  group_col: null                      # no source-doc grouping in simple pipeline
  stratify_col: label_binary
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

output:
  checkpoint_dir: "checkpoints/baseline_simple"
  log_dir: "logs/baseline_simple"
