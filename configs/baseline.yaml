# GCS bucket name — set this to your actual bucket before running on Vertex AI Workbench
# On Vertex AI Workbench the bucket is mounted at /gcs/<bucket_name>/
# Example: if bucket_name is "hal-risk-data", paths resolve to /gcs/hal-risk-data/...
gcs:
  bucket_name: "YOUR_BUCKET_NAME"          # <-- replace with your GCS bucket name
  mount_root: "/gcs"                       # GCSFuse mount point on Vertex AI Workbench

model:
  name: resnet50
  pretrained: true
  num_classes: 1

training:
  epochs: 30
  batch_size: 32
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  early_stopping_patience: 5
  loss: bce_with_logits

data:
  dpi: 150
  image_size: 224
  grayscale: true
  augmentation: true
  # GCS-mounted paths (auto-resolved via GCSFuse on Vertex AI Workbench)
  metadata_csv: "/gcs/YOUR_BUCKET_NAME/data/metadata.csv"
  rendered_dir: "/gcs/YOUR_BUCKET_NAME/rendered_pages"

splits:
  strategy: grouped
  group_col: template_family          # NOTE: use template_family not institution —
  train_ratio: 0.70                   # institution is perfectly correlated with label
  val_ratio: 0.15
  test_ratio: 0.15

output:
  checkpoint_dir: "/gcs/YOUR_BUCKET_NAME/checkpoints/baseline"
  log_dir: "/gcs/YOUR_BUCKET_NAME/logs/baseline"
